<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Showtimes - Movie Day</title>
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #ff1493;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #00d2ff;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(138, 43, 226, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(255, 20, 147, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--surface);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        select, input {
            padding: 0.75rem;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-family: inherit;
        }

        .movie-group {
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .movie-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
            padding-bottom: 0.5rem;
        }

        .showtime-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .showtime-pill {
            background: rgba(138, 43, 226, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.9rem;
            border: 1px solid rgba(138, 43, 226, 0.3);
            transition: 0.2s;
        }

        .showtime-pill:hover {
            background: var(--primary);
            color: white;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'shifts:home' %}" class="back-link">← Back to Scheduler</a>
        <h1>All Showtimes</h1>

        <form method="GET" class="controls">
            <select name="cinema">
                {% for c in cinemas %}
                <option value="{{ c.id }}" {% if c.id|stringformat:"s" == request.GET.cinema %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
            <input type="date" name="date" value="{{ target_date|date:'Y-m-d' }}">
            <button type="submit" class="btn">Update List</button>
        </form>

        {% if grouped_shows %}
            {% for movie, shows in grouped_shows.items %}
            <div class="movie-group">
                <div class="movie-title">{{ movie }}</div>
                <div class="showtime-list">
                    {% for st in shows %}
                    <span class="showtime-pill">{{ st|date:"H:i" }}</span>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        {% else %}
            <p style="text-align: center; color: var(--text-muted);">No shows found for this date. Try another cinema or date.</p>
        {% endif %}
    </div>
</body>
</html>
